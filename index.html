<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ChatGPT Edu — школы и детские сады Казахстана</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
:root{--bg:#f3f5f8;--card:#fff;--ink:#1c2b3a;--muted:#5f6b7a;--line:#e2e7ee;--navy:#16324f;--navy2:#1f4568;--accent:#1a73c9;--accent2:#3e97e8;--good:#1e9e63;--mid:#e08a2e;--bad:#d64545;--neutral:#8a94a3;--shadow:0 4px 18px rgba(22,50,79,.08)}
*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink)}.wrap{max-width:1180px;margin:auto;padding:22px 20px 60px}
.top{display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;background:var(--navy);color:#fff;border-radius:14px;padding:22px 26px;box-shadow:var(--shadow)}
.top h1{margin:0;font-size:21px}.top p{margin:6px 0 0;opacity:.85;font-size:13.5px}.actions{display:flex;gap:10px;align-items:center}button{border:0;cursor:pointer;font-weight:700}
.reload{background:rgba(255,255,255,.14);color:#fff;padding:9px 14px;border-radius:9px}.lang{display:flex;gap:6px;background:rgba(255,255,255,.12);padding:5px;border-radius:10px}.lang button{padding:8px 16px;border-radius:7px;background:transparent;color:#fff}.lang button.active{background:#fff;color:var(--navy)}
.card,.kpi{background:var(--card);border-radius:12px;box-shadow:var(--shadow)}.card{padding:20px;margin-top:18px}.card h2{margin:0 0 4px;font-size:16px;color:var(--navy)}.hint{color:var(--muted);font-size:12.5px;margin:0 0 14px}
.timeline{padding:16px 20px 14px}.tl-head{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}.tl-head h2{font-size:12.5px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin:0}.tl-left{font-size:13px;font-weight:700;color:var(--navy)}.tl-track{position:relative;height:6px;background:#e2e7ee;border-radius:99px;margin:14px 0 8px}.tl-fill{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:99px}.tl-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:var(--accent);border:3px solid #fff;box-shadow:0 0 0 3px rgba(26,115,201,.25)}.tl-months,.tl-dates{display:flex;justify-content:space-between;color:var(--muted)}.tl-months{font-size:10.5px}.tl-dates{font-size:11.5px;margin-top:8px;line-height:1.45}.tl-dates b{color:var(--ink);font-size:12.5px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:18px 0 4px}.kpi{padding:18px;border-top:4px solid var(--accent)}.kpi .val{font-size:29px;font-weight:800;color:var(--navy)}.kpi .lab{color:var(--muted);font-size:13px;margin-top:6px}.kpi .sub{font-size:12px;margin-top:8px;color:var(--muted);font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}.chartbox{position:relative;height:430px}
.combo{position:relative}input,select{width:100%;padding:12px 14px;border-radius:9px;border:1.5px solid var(--line);font-size:14px;background:#fff;color:var(--ink)}.combolist{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:9px;max-height:300px;overflow:auto;z-index:20;box-shadow:0 8px 24px rgba(22,50,79,.16)}.combolist div{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f2f5f9;font-size:13.5px}.combolist div:hover{background:#f0f5fa}
.spot{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:16px}.spotcard{border-radius:10px;padding:16px;color:#fff}.spotcard .n{font-size:25px;font-weight:800}.spotcard .t{font-size:12.5px;opacity:.9;margin-top:4px}.s1{background:var(--navy)}.s2{background:var(--navy2)}.s3{background:var(--accent)}
.hbars{margin-top:18px;display:grid;gap:9px}.hbar{display:grid;grid-template-columns:170px 1fr 120px;align-items:center;gap:12px;font-size:12.5px}.hbar .l{color:var(--muted);font-weight:600}.track{background:#eceff4;border-radius:6px;height:20px;overflow:hidden}.fill{height:100%;border-radius:6px;min-width:4px}.v{text-align:right;font-weight:700}
.tree{display:grid;gap:10px}.tree details{border:1px solid var(--line);border-radius:10px;background:#fff;overflow:hidden}.tree details details{margin:8px 12px;border-radius:8px}.tree summary{list-style:none;cursor:pointer;padding:13px 15px;display:flex;align-items:center;gap:10px;font-weight:700;color:var(--navy);background:#f8fafc}.tree summary::-webkit-details-marker{display:none}.tree summary::before{content:"▸";transition:transform .15s;color:var(--accent)}.tree details[open]>summary::before{transform:rotate(90deg)}.tree .meta{margin-left:auto;display:flex;gap:12px;font-size:12px;color:var(--muted)}.tree .type-block>summary{background:#fff;color:var(--ink)}
.inst-list{padding:0 12px 12px}.inst-head,.inst-row{display:grid;grid-template-columns:minmax(260px,1fr) repeat(4,110px);gap:10px;align-items:center}.inst-head{padding:9px 8px;color:var(--muted);font-size:11px;font-weight:700;border-bottom:1px solid var(--line)}.inst-row{padding:10px 8px;border-top:1px solid var(--line);font-size:12.5px}.inst-name{font-weight:600;line-height:1.35}.inst-metric{text-align:right}
.loading{padding:60px;text-align:center;color:var(--muted)}.err{background:#fdf1f1;border:1px solid #e8c4c4;color:#7c2f2f;padding:18px;border-radius:10px}.srcbar{font-size:11.5px;color:var(--muted);text-align:center;margin-top:26px}
@media(max-width:860px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.spot{grid-template-columns:repeat(2,1fr)}}@media(max-width:640px){.wrap{padding:12px 10px 40px}.top{padding:14px 16px}.kpis{gap:10px}.kpi .val{font-size:22px}.tl-months{display:none}.hbar{grid-template-columns:100px 1fr 90px}.tree .meta{display:none}.inst-head{display:none}.inst-row{grid-template-columns:1fr 1fr}.inst-name{grid-column:1/-1}.inst-metric{text-align:left}}
</style>
</head><body><div class="wrap">
<header class="top"><div><h1 id="ttl"></h1><p id="sub"></p></div><div class="actions"><button class="reload" onclick="loadData()">⟳</button><div class="lang"><button data-l="kz" onclick="setLang('kz')">ҚАЗ</button><button data-l="ru" class="active" onclick="setLang('ru')">РУС</button></div></div></header>
<div id="app"><div class="loading">Загрузка данных…</div></div><div class="srcbar" id="src"></div></div>
<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSDrccbs1chrR8dXBjOc1eMA3vIKclVIHCjted-_itgYDFUA7QBvTzu76CV7TuUFaMXWikIxKJa37m9/pub?gid=1899398267&single=true&output=csv';
const T={ru:{title:"ChatGPT Edu в школах и детских садах Казахстана",sub:"Показатели активации лицензий по регионам, районам и учреждениям.",loading:"Загрузка данных…",inst:"Учреждений",issued:"Выдано лицензий",activated:"Активировано лицензий",coverage:"Общий охват активации",leaders:"Лидеры активации",leadersHint:"Топ-10 учреждений по проценту активации.",attention:"Требуют внимания",attentionHint:"10 учреждений с наименьшим процентом активации.",profile:"Профиль учреждения",profileHint:"Начните вводить название учреждения.",search:"Поиск учреждения…",nores:"Ничего не найдено",completed:"Завершили модуль",rate:"Процент активации",region:"Регион",district:"Район",type:"Тип",all:"Все области и учреждения",schools:"Школы",kindergartens:"Детсады",timeline:"Сроки проекта · 12 месяцев",start:"Запуск проекта",end:"Завершение проекта",left:"Осталось",days:"дн.",passed:"пройдено",updated:"Последнее обновление"},kz:{title:"ChatGPT Edu — Қазақстан мектептері мен балабақшаларында",sub:"Өңірлер, аудандар және ұйымдар бойынша лицензияларды белсендіру көрсеткіштері.",loading:"Деректер жүктелуде…",inst:"Ұйымдар",issued:"Берілген лицензиялар",activated:"Белсендірілген лицензиялар",coverage:"Жалпы белсендіру қамтуы",leaders:"Белсендіру көшбасшылары",leadersHint:"Белсендіру пайызы бойынша үздік 10 ұйым.",attention:"Назар аударуды қажет етеді",attentionHint:"Белсендіру пайызы ең төмен 10 ұйым.",profile:"Ұйым профилі",profileHint:"Ұйым атауын енгізіңіз.",search:"Ұйымды іздеу…",nores:"Ештеңе табылмады",completed:"Модульді аяқтады",rate:"Белсендіру пайызы",region:"Өңір",district:"Аудан",type:"Түрі",all:"Барлық өңірлер мен ұйымдар",schools:"Мектептер",kindergartens:"Балабақшалар",timeline:"Жоба мерзімі · 12 ай",start:"Жобаның басталуы",end:"Жобаның аяқталуы",left:"Қалды",days:"күн",passed:"өткен",updated:"Соңғы жаңарту"}};
let LANG='ru',DATA=[],charts={},SEL=null;
const fmt=n=>Number(n||0).toLocaleString(LANG==='kz'?'kk-KZ':'ru-RU'); const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); const norm=s=>String(s||'').trim().toLowerCase();
function t(k){return T[LANG][k]||k} function num(s){const v=parseFloat(String(s??'').replace(/\s/g,'').replace(',','.').replace(/[^0-9.\-]/g,''));return isNaN(v)?0:v}
function parseCSV(text){const rows=[];let row=[],cur='',q=false;for(let i=0;i<text.length;i++){const ch=text[i];if(q){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i++}else q=false}else cur+=ch}else{if(ch==='"')q=true;else if(ch===','){row.push(cur);cur=''}else if(ch==='
'){row.push(cur);rows.push(row);row=[];cur=''}else if(ch!=='')cur+=ch}}if(cur.length||row.length){row.push(cur);rows.push(row)}return rows}
function buildData(rows){if(!rows.length)return[];const h=rows[0].map(norm),find=w=>h.findIndex(x=>w.some(z=>x.includes(z)));const ir=find(['регион','область','өңір']),it=find(['тип','түр']),id=find(['район','аудан']),inm=find(['учреждение','наименование','организация','ұйым']),ii=find(['выдано лицензий','начали вводный','берілген лиценз']),ic=find(['завершили','аяқтады']),ia=find(['активировано','активировали','белсендір']),idt=find(['дата обновления','жаңарту']);return rows.slice(1).filter(r=>r.some(x=>String(x).trim())).map((r,i)=>{const issued=num(r[ii]),completed=num(r[ic]),activated=num(r[ia]);return{id:i+1,region:(r[ir]||'').trim(),type:(r[it]||'').trim(),district:(r[id]||'').trim(),name:(r[inm]||'').trim(),issued,completed,activated,rate:issued?activated/issued:0,date:idt>=0?(r[idt]||'').trim():''}}).filter(r=>r.region&&r.name)}
function totals(rows){const x={count:rows.length,issued:0,completed:0,activated:0};rows.forEach(r=>{x.issued+=r.issued;x.completed+=r.completed;x.activated+=r.activated});x.rate=x.issued?x.activated/x.issued:0;return x}
function statusColor(r){return r>=.5?'#1e9e63':r>=.25?'#b7a02c':r>=.1?'#e08a2e':'#d64545'}
function timelineHTML(){const s=new Date(2026,2,30),e=new Date(2027,2,29),now=Date.now(),ep=Math.max(0,Math.min(100,(now-s)/(e-s)*100)),left=Math.max(0,Math.ceil((e-now)/86400000)),months=LANG==='kz'?['нау'26','сәу','мам','мау','шіл','там','қыр','қаз','қар','жел','қаң'27','ақп','нау'27']:['мар'26','апр','май','июн','июл','авг','сен','окт','ноя','дек','янв'27','фев','мар'27'];return `<div class="card timeline"><div class="tl-head"><h2>${t('timeline')}</h2><span class="tl-left">${t('left')} ${left} ${t('days')} · ${t('passed')} ${ep.toFixed(0)}%</span></div><div class="tl-track"><div class="tl-fill" style="width:${ep}%"></div><div class="tl-dot" style="left:${ep}%"></div></div><div class="tl-months">${months.map(m=>`<span>${m}</span>`).join('')}</div><div class="tl-dates"><div><b>30.03.2026</b><br>${t('start')}</div><div style="text-align:right"><b>29.03.2027</b><br>${t('end')}</div></div></div>`}
async function loadData(){document.getElementById('app').innerHTML=`<div class="loading">${t('loading')}</div>`;try{const r=await fetch(CSV_URL,{cache:'no-store'});if(!r.ok)throw Error('HTTP '+r.status);DATA=buildData(parseCSV(await r.text()));if(!DATA.length)throw Error('Нет данных');render()}catch(e){document.getElementById('app').innerHTML=`<div class="card"><div class="err">Не удалось загрузить данные: ${esc(e.message)}</div></div>`}}
function setLang(l){LANG=l;document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('active',b.dataset.l===l));document.documentElement.lang=l==='kz'?'kk':'ru';header();if(DATA.length)render()} function header(){document.getElementById('ttl').textContent=t('title');document.getElementById('sub').textContent=t('sub')}
function drawChart(id,rows,color){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels:rows.map(r=>r.name.length>38?r.name.slice(0,36)+'…':r.name),datasets:[{data:rows.map(r=>+(r.rate*100).toFixed(1)),backgroundColor:color,borderRadius:4,barThickness:14}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.x+'%'}}},scales:{x:{min:0,max:100,ticks:{callback:v=>v+'%'}},y:{grid:{display:false}}}}})}
function profileHTML(){return `<div class="card"><h2>${t('profile')}</h2><p class="hint">${t('profileHint')}</p><div class="combo"><input id="spotSearch" placeholder="${t('search')}" oninput="comboFilter()" onfocus="comboFilter()"><div id="comboList" class="combolist" hidden></div></div><div id="spotOut"></div></div>`}
function comboFilter(){const q=norm(document.getElementById('spotSearch').value),list=document.getElementById('comboList'),opts=DATA.filter(r=>!q||norm(r.name).includes(q)||norm(r.region).includes(q)).slice(0,40);list.innerHTML=opts.length?opts.map(r=>`<div onclick="selectInst(${r.id})">${esc(r.name)} · <b>${(r.rate*100).toFixed(1)}%</b></div>`).join(''):`<div>${t('nores')}</div>`;list.hidden=false} function selectInst(id){SEL=id;document.getElementById('comboList').hidden=true;drawSpot(id)}
function drawSpot(id){const r=DATA.find(x=>x.id===id)||DATA[0];SEL=r.id;const s=document.getElementById('spotSearch');if(s)s.value=r.name;document.getElementById('spotOut').innerHTML=`<div class="spot"><div class="spotcard s1"><div class="n">${fmt(r.issued)}</div><div class="t">${t('issued')}</div></div><div class="spotcard s2"><div class="n">${fmt(r.completed)}</div><div class="t">${t('completed')}</div></div><div class="spotcard s3"><div class="n">${fmt(r.activated)}</div><div class="t">${t('activated')}</div></div><div class="spotcard" style="background:${statusColor(r.rate)}"><div class="n">${(r.rate*100).toFixed(1)}%</div><div class="t">${t('rate')}</div></div></div><div class="hbars"><div class="hbar"><span class="l">${t('issued')}</span><div class="track"><div class="fill" style="width:100%;background:var(--navy)"></div></div><span class="v">${fmt(r.issued)} · 100%</span></div><div class="hbar"><span class="l">${t('completed')}</span><div class="track"><div class="fill" style="width:${Math.min(100,r.issued?r.completed/r.issued*100:0)}%;background:var(--accent)"></div></div><span class="v">${fmt(r.completed)}</span></div><div class="hbar"><span class="l">${t('activated')}</span><div class="track"><div class="fill" style="width:${Math.min(100,r.rate*100)}%;background:${statusColor(r.rate)}"></div></div><span class="v">${fmt(r.activated)} · ${(r.rate*100).toFixed(1)}%</span></div></div><p class="hint" style="margin-top:14px"><b>${esc(r.region)}</b> · ${esc(r.district)} · ${esc(r.type)}</p>`}
function treeHTML(){const regions=[...new Set(DATA.map(r=>r.region))].sort((a,b)=>a.localeCompare(b,'ru'));return `<div class="card"><h2>${t('all')}</h2><p class="hint">${t('region')} → ${t('district')} → ${t('type')} → ${t('inst')}</p><div class="tree">${regions.map(region=>{const rr=DATA.filter(r=>r.region===region),rt=totals(rr),districts=[...new Set(rr.map(r=>r.district))].sort((a,b)=>a.localeCompare(b,'ru'));return `<details><summary>${esc(region)}<span class="meta"><span>${fmt(rt.count)} ${t('inst').toLowerCase()}</span><span>${(rt.rate*100).toFixed(1)}%</span></span></summary>${districts.map(d=>{const dr=rr.filter(r=>r.district===d),dt=totals(dr);return `<details><summary>${esc(d)}<span class="meta"><span>${fmt(dt.count)}</span><span>${(dt.rate*100).toFixed(1)}%</span></span></summary>${['школы','детсады'].map(tp=>{const rows=dr.filter(r=>norm(r.type).includes(tp==='школы'?'школ':'детсад'));if(!rows.length)return'';const tt=totals(rows);return `<details class="type-block"><summary>${tp==='школы'?t('schools'):t('kindergartens')}<span class="meta"><span>${rows.length}</span><span>${(tt.rate*100).toFixed(1)}%</span></span></summary><div class="inst-list"><div class="inst-head"><span>${t('inst')}</span><span>${t('issued')}</span><span>${t('completed')}</span><span>${t('activated')}</span><span>${t('rate')}</span></div>${rows.sort((a,b)=>b.rate-a.rate).map(r=>`<div class="inst-row"><div class="inst-name">${esc(r.name)}</div><div class="inst-metric">${fmt(r.issued)}</div><div class="inst-metric">${fmt(r.completed)}</div><div class="inst-metric">${fmt(r.activated)}</div><div class="inst-metric" style="color:${statusColor(r.rate)};font-weight:700">${(r.rate*100).toFixed(1)}%</div></div>`).join('')}</div></details>`}).join('')}</details>`}).join('')}</details>`}).join('')}</div></div>`}
function render(){header();const nat=totals(DATA),sorted=DATA.slice().sort((a,b)=>b.rate-a.rate),top=sorted.slice(0,10),low=sorted.slice(-10).reverse();document.getElementById('app').innerHTML=`${timelineHTML()}<div class="kpis"><div class="kpi" style="border-top-color:var(--navy)"><div class="val">${fmt(nat.count)}</div><div class="lab">${t('inst')}</div></div><div class="kpi"><div class="val">${fmt(nat.issued)}</div><div class="lab">${t('issued')}</div></div><div class="kpi" style="border-top-color:var(--good)"><div class="val">${fmt(nat.activated)}</div><div class="lab">${t('activated')}</div></div><div class="kpi" style="border-top-color:${statusColor(nat.rate)}"><div class="val" style="color:${statusColor(nat.rate)}">${(nat.rate*100).toFixed(2)}%</div><div class="lab">${t('coverage')}</div><div class="sub">${t('activated')} ÷ ${t('issued').toLowerCase()}</div></div></div><div class="grid2"><div class="card"><h2>${t('leaders')}</h2><p class="hint">${t('leadersHint')}</p><div class="chartbox"><canvas id="topChart"></canvas></div></div><div class="card"><h2>${t('attention')}</h2><p class="hint">${t('attentionHint')}</p><div class="chartbox"><canvas id="lowChart"></canvas></div></div></div>${profileHTML()}${treeHTML()}`;drawChart('topChart',top,'#1e9e63');drawChart('lowChart',low,'#d64545');drawSpot(SEL||DATA[0].id);document.getElementById('src').textContent=`${t('updated')}: ${DATA.find(x=>x.date)?.date||new Date().toLocaleString()}`}
document.addEventListener('click',e=>{const c=document.querySelector('.combo');if(c&&!c.contains(e.target)){const l=document.getElementById('comboList');if(l)l.hidden=true}});header();loadData();
</script></body></html>
